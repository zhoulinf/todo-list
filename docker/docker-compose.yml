services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: todo
    ports:
      - "3307:3307"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: docker/backend-dockerfile
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_DATABASE: todo
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/front-dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
